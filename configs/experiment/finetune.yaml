# @package _global_

defaults:
  - denoiser_flow_matching
  - _self_

experiment_name: finetune_radii_${now:%Y-%m-%d_%H-%M-%S}
tags: ["finetune", "radii"]

data:
  data_root: ./data/radii/radii.hdf5
  categories: ["radii"]
  multi_ref: true
  batch_size: 2

trainer:
  num_nodes: 1
  max_epochs: 500
  check_val_every_n_epoch: 10
  log_every_n_steps: 1
  accumulate_grad_batches: 2
  num_sanity_val_steps: 0

model:
  lora_config:
    _target_: peft.LoraConfig
    r: 128
    lora_alpha: 256
    lora_dropout: 0.1
    target_modules: "transformer_layers\\.\\d+\\.(self_attn_to_qkv|self_attn_to_out\\.0|global_attn_to_qkv|global_attn_to_out\\.0|ff\\.net\\.2|norm\\.d+\\.(linear|timestep_embbedder\\.(linear_1|linear_2)))"
    modules_to_save: ["mlp_out_trans", "mlp_out_rot", "shape_embedding"]

ckpt_path: ./models/GARF_mini.ckpt
finetuning: true
project_name: GARF
